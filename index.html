<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Маркетплейсы Resfood · 2025/26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F8F4EC;
  --bg-2:#F1ECDF;
  --paper:#FCF9F2;
  --white:#FFFFFF;
  --ink:#1A1814;
  --ink-2:#3A352E;
  --ink-3:#5A5246;
  --muted:#867C70;
  --line:#EBE3D2;
  --line-2:#DDD2BC;
  --red:#C8302A;
  --red-d:#9E2520;
  --red-l:#E89189;
  --red-bg:#FBE5E2;
  --red-soft:#F4D2CE;
  --green:#2D4A35;
  --green-d:#1F3527;
  --green-l:#6E8B6F;
  --green-bg:#E2EAD9;
  --green-soft:#CFDDC2;
  --gold:#C9941F;
  --gold-bg:#F5E5BE;
  /* Marketplace brand colors */
  --ozon:#005BFF;
  --ozon-d:#003ECC;
  --ozon-bg:#E0EBFF;
  --wb:#CB11AB;
  --wb-d:#841176;
  --wb-bg:#F8E0F2;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;font-feature-settings:'cv02','cv03','cv04','cv11'}
body{background:var(--bg)}

/* Slide deck */
.deck{position:relative;width:100vw;height:100vh;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;padding:48px 64px 64px;opacity:0;visibility:hidden;transform:translateX(36px);transition:opacity .5s cubic-bezier(.2,.7,.2,1), transform .5s cubic-bezier(.2,.7,.2,1)}
.slide.active{opacity:1;visibility:visible;transform:none}
.slide.prev{transform:translateX(-36px)}

/* Header bar */
.tbar{display:flex;align-items:center;justify-content:space-between;font-size:12px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;font-weight:600}
.tbar .brand{display:flex;align-items:center;gap:12px}
.brand-mark{display:flex;align-items:center;gap:0}
.brand-mark .sq{width:32px;height:32px;border-radius:6px;background:var(--red);display:flex;align-items:center;justify-content:center;color:var(--white);font-weight:800;font-size:15px;letter-spacing:-.02em;overflow:hidden}
.brand-mark .sq img{width:100%;height:100%;object-fit:contain;display:block}
.brand-mark .nm{margin-left:12px;font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.04em;text-transform:uppercase}
.tbar .right{display:flex;align-items:center;gap:18px}
.dot{width:4px;height:4px;border-radius:50%;background:var(--ink);opacity:.3}

/* Footer bar */
.fbar{position:absolute;left:64px;right:64px;bottom:24px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.04em}
.progress{flex:1;margin:0 30px;height:2px;background:var(--line);border-radius:2px;overflow:hidden}
.progress > i{display:block;height:100%;background:var(--red);width:0;transition:width .5s ease}

/* Body */
.body{flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:14px}

/* Typography — Inter throughout */
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:14px}
h1.t{font-weight:800;font-size:58px;line-height:1.0;letter-spacing:-0.025em;color:var(--ink)}
h2.t{font-weight:800;font-size:48px;line-height:1.05;letter-spacing:-0.02em;color:var(--ink);max-width:1100px}
h3.t{font-weight:700;font-size:36px;line-height:1.1;letter-spacing:-0.015em}
.sub{font-size:17px;line-height:1.5;color:var(--ink-2);max-width:880px;margin-top:16px;font-weight:400}
.tiny{font-size:12.5px;color:var(--muted);font-weight:500;letter-spacing:.01em}

/* Big number */
.bignum-wrap{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:8px}
.bignum{font-weight:900;font-size:240px;line-height:.85;letter-spacing:-0.05em;color:var(--ink);display:flex;align-items:flex-start}
.bignum .unit{font-size:54px;font-weight:700;color:var(--red);margin-left:18px;margin-top:14px;letter-spacing:-.02em}
.bignum.red{color:var(--red)}
.caption{font-size:20px;line-height:1.45;color:var(--ink-2);max-width:780px;margin-top:24px;font-weight:500}
.note{margin-top:18px;font-size:13.5px;color:var(--muted);max-width:700px;font-weight:500}

/* Cover */
.cover{display:grid;grid-template-columns: 1.05fr 1fr;gap:60px;align-items:end;height:100%}
.cover .left h1{font-weight:800;font-size:90px;line-height:.96;letter-spacing:-.03em;color:var(--ink)}
.cover .left h1 .accent{color:var(--red)}
.cover .left .meta{margin-top:34px;font-size:13px;color:var(--muted);letter-spacing:.1em;font-weight:700;text-transform:uppercase}
.cover .right{display:flex;flex-direction:column;align-items:flex-end;gap:14px;padding-bottom:8px}
.cover .right .num{font-weight:900;font-size:200px;line-height:.85;color:var(--red);letter-spacing:-.05em}
.cover .right .label{font-size:16px;color:var(--ink-2);max-width:380px;text-align:right;line-height:1.5;font-weight:500}
.cover .right .unit-line{font-size:18px;font-weight:700;color:var(--red-d);letter-spacing:.04em;text-transform:uppercase}

/* Five reasons */
.five-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:24px}
.reason{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:24px 22px;display:flex;flex-direction:column;gap:14px;min-height:340px;position:relative;overflow:hidden;transition:transform .3s ease, box-shadow .3s ease}
.reason::before{content:"";position:absolute;left:0;top:0;width:4px;height:100%;background:var(--red)}
.reason:nth-child(2)::before,.reason:nth-child(4)::before{background:var(--green)}
.reason:hover{transform:translateY(-3px);box-shadow:0 14px 30px -18px rgba(158,37,32,.3)}
.reason .num{font-weight:800;font-size:36px;color:var(--red);line-height:1;letter-spacing:-.02em}
.reason:nth-child(2) .num,.reason:nth-child(4) .num{color:var(--green)}
.reason .title{font-weight:700;font-size:19px;line-height:1.2;color:var(--ink);letter-spacing:-.01em}
.reason .metric{display:inline-block;background:var(--red-bg);color:var(--red-d);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:6px 10px;border-radius:6px;width:fit-content}
.reason:nth-child(2) .metric,.reason:nth-child(4) .metric{background:var(--green-bg);color:var(--green-d)}
.reason .body{font-size:13px;line-height:1.55;color:var(--ink-3);font-weight:400}

/* Section dividers */
.divider-slide{display:flex;flex-direction:column;justify-content:center;height:100%;position:relative}
.divider-bgnum{position:absolute;right:0;top:50%;transform:translateY(-50%);font-weight:900;font-size:520px;line-height:.85;color:var(--red);opacity:.07;letter-spacing:-.06em;pointer-events:none}
.divider-content{position:relative;z-index:2;max-width:1100px}
.divider-lab{display:inline-flex;align-items:center;gap:10px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:24px}
.divider-lab .dotg{width:8px;height:8px;border-radius:50%;background:var(--red)}
.divider-content h2{font-weight:800;font-size:88px;line-height:.98;letter-spacing:-.03em;color:var(--ink)}
.divider-underline{width:80px;height:5px;background:var(--green);margin-top:32px;border-radius:3px}
.divider-sub{font-size:20px;color:var(--ink-2);margin-top:24px;max-width:700px;line-height:1.45;font-weight:500}

/* Comparison */
.cmp{display:grid;grid-template-columns:1fr auto 1fr;gap:30px;align-items:stretch;height:100%}
.cmp .col{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:36px 34px;min-height:380px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.cmp .col.red{background:var(--red-bg);border-color:var(--red-soft)}
.cmp .col.red::after{content:"";position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle, rgba(200,48,42,.13), transparent 60%);bottom:-100px;right:-90px}
.cmp .col h4{font-size:12px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:700}
.cmp .col .big{font-weight:900;font-size:140px;line-height:.85;letter-spacing:-.05em;color:var(--ink);margin-top:16px}
.cmp .col.red .big{color:var(--red)}
.cmp .col .label{margin-top:18px;font-size:17px;line-height:1.4;color:var(--ink-2);font-weight:500}
.cmp .col .small{margin-top:8px;font-size:13px;color:var(--muted);line-height:1.5}
.cmp .vs{font-size:32px;color:var(--muted);font-weight:300;align-self:center}

/* Marketplace branded cards (slide 5) */
.cmp .col.ozon{background:var(--white);border-color:var(--ozon);border-top-width:5px;border-top-style:solid}
.cmp .col.ozon::after{content:"";position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle, rgba(0,91,255,.10), transparent 60%);bottom:-100px;right:-90px;pointer-events:none}
.cmp .col.ozon .big{color:var(--ozon)}
.cmp .col.ozon .brand-tag{color:var(--ozon)}
.cmp .col.wb{background:var(--white);border-color:var(--wb);border-top-width:5px;border-top-style:solid}
.cmp .col.wb::after{content:"";position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle, rgba(203,17,171,.08), transparent 60%);bottom:-90px;right:-80px;pointer-events:none}
.cmp .col.wb .big{color:var(--wb)}
.cmp .col.wb .brand-tag{color:var(--wb)}
.brand-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brand-chip{display:inline-flex;align-items:center;justify-content:center;height:26px;padding:0 12px;border-radius:6px;color:#fff;font-weight:800;font-size:12px;letter-spacing:.04em}
.brand-chip.ozon{background:var(--ozon)}
.brand-chip.wb{background:var(--wb)}
.brand-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em}
.cmp .col.ozon .hl-pill{background:var(--ozon-bg);color:var(--ozon-d)}
.cmp .col.ozon .hl-pill .dot-r{background:var(--ozon)}

/* Chart slide */
.chart-slide{display:grid;grid-template-rows:auto 1fr auto;height:100%;gap:18px}
.chart-canvas{position:relative;background:var(--white);border:1px solid var(--line);border-radius:14px;padding:28px 30px}
.chart-canvas canvas{position:absolute;left:30px;right:30px;top:30px;bottom:30px;width:calc(100% - 60px) !important;height:calc(100% - 60px) !important}
.chart-anno{display:flex;gap:24px;font-size:12.5px;color:var(--ink-2);font-weight:500;flex-wrap:wrap;align-items:center}
.chart-anno b{color:var(--red);font-weight:700}
.hl-pill{display:inline-flex;align-items:center;gap:8px;background:var(--red-bg);color:var(--red-d);padding:8px 14px;border-radius:6px;font-weight:700;font-size:12.5px}
.hl-pill .dot-r{width:6px;height:6px;border-radius:50%;background:var(--red)}
.hl-pill.green{background:var(--green-bg);color:var(--green-d)}
.hl-pill.green .dot-r{background:var(--green)}

/* ABC split */
.split{display:grid;grid-template-columns:1fr 1fr;gap:24px;height:100%}
.split .card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:36px;display:flex;flex-direction:column;gap:18px;position:relative;overflow:hidden}
.split .card.A{background:var(--red-bg);border-color:var(--red-soft)}
.split .card .lbl{display:inline-flex;align-items:center;gap:10px;font-size:11.5px;letter-spacing:.14em;color:var(--red-d);text-transform:uppercase;font-weight:700;width:fit-content}
.split .card.C .lbl{color:var(--muted)}
.split .card .class-badge{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:10px;background:var(--red);color:#fff;font-weight:900;font-size:24px;letter-spacing:-.02em}
.split .card.C .class-badge{background:var(--ink-3)}
.split .card .class-row{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.split .card .class-row .meta{display:flex;flex-direction:column}
.split .card .class-row .meta .lbl{margin:0}
.split .card .class-row .meta .name{font-size:13px;color:var(--muted);font-weight:600;margin-top:2px}
.split .card.C .class-row .meta .name{color:var(--muted)}
.split .card h3{font-weight:800;font-size:36px;line-height:1.05;color:var(--ink);letter-spacing:-.02em}
.split .card .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:6px}
.split .card .stat{background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:10px;padding:16px}
.split .card.C .stat{background:var(--paper)}
.split .card .stat .v{font-weight:800;font-size:32px;line-height:1;color:var(--ink);letter-spacing:-.02em}
.split .card .stat .n{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-top:6px}
.split .card .desc{font-size:14px;line-height:1.55;color:var(--ink-3);margin-top:auto;font-weight:400}

/* Table */
.tbl-wrap{margin-top:18px;background:var(--white);border:1px solid var(--line);border-radius:12px;overflow:hidden}
table.cat{width:100%;border-collapse:collapse;font-size:13.5px}
table.cat thead th{background:var(--bg-2);text-align:left;padding:14px 16px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);font-weight:700;border-bottom:1px solid var(--line)}
table.cat td{padding:13px 16px;border-bottom:1px solid var(--line);color:var(--ink-2);vertical-align:middle}
table.cat tr:last-child td{border-bottom:none}
table.cat td.cat-name{font-weight:600;color:var(--ink)}
table.cat td.share{font-weight:800;font-size:18px;color:var(--ink);letter-spacing:-.02em}
table.cat td.lead-1 .share{color:var(--red)}
.bar-mini{position:relative;height:5px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:5px;width:120px}
.bar-mini i{position:absolute;left:0;top:0;height:100%;background:var(--red);border-radius:99px;width:0;transition:width 1s ease}
.tag{display:inline-block;font-size:10.5px;font-weight:700;padding:5px 9px;border-radius:6px;letter-spacing:.04em;text-transform:uppercase}
.tag.green{background:var(--green-bg);color:var(--green-d)}
.tag.yellow{background:var(--gold-bg);color:#7A5400}
.tag.red{background:var(--red-bg);color:var(--red-d)}
.tag.gray{background:var(--bg-2);color:#5A5246}

/* Three columns */
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:24px}
.three-col.five{grid-template-columns:repeat(5,1fr);gap:14px}
.col-card{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:26px 24px;display:flex;flex-direction:column;gap:14px;min-height:300px;position:relative;overflow:hidden}
.col-card::before{content:"";position:absolute;left:0;top:0;width:4px;height:100%;background:var(--red)}
.col-card.green::before{background:var(--green)}
.col-card .num{font-weight:800;font-size:42px;color:var(--red);line-height:1;letter-spacing:-.03em}
.col-card.green .num{color:var(--green)}
.col-card h4{font-weight:700;font-size:21px;line-height:1.2;color:var(--ink);letter-spacing:-.01em}
.col-card .metric{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--red-d);background:var(--red-bg);padding:6px 10px;border-radius:6px;width:fit-content}
.col-card.green .metric{color:var(--green-d);background:var(--green-bg)}
.col-card .body{font-size:13px;line-height:1.55;color:var(--ink-3)}

/* AI link slide */
.ai-slide{display:grid;grid-template-columns:1.05fr 1fr;gap:36px;height:100%;align-items:center}
.ai-slide .left{padding-right:20px}
.ai-slide .right{background:linear-gradient(135deg, #1A2820 0%, #1F3527 100%);border-radius:18px;padding:42px;color:#F4ECDB;height:100%;max-height:520px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.ai-slide .right::before{content:"";position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle, rgba(200,48,42,.4), transparent 65%);top:-90px;right:-90px}
.ai-slide .right .lab{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--red-l);font-weight:700;z-index:2;position:relative}
.ai-slide .right .ttl{font-weight:800;font-size:36px;line-height:1.1;margin-top:14px;z-index:2;position:relative;letter-spacing:-.02em}
.ai-slide .right .ttl .accent{color:var(--red-l)}
.ai-slide .right .url{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13.5px;color:var(--red-l);margin-top:24px;word-break:break-all;z-index:2;position:relative}
.ai-slide .right .cta{display:inline-flex;align-items:center;gap:10px;background:var(--red);color:#FFF;padding:14px 22px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;margin-top:24px;width:fit-content;z-index:2;position:relative;transition:transform .2s ease, background .2s ease}
.ai-slide .right .cta:hover{transform:translateX(4px);background:var(--red-d)}
.ai-slide .right .arrow{font-size:18px}

/* Forecast layout (slide 14) */
.forecast-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.forecast-card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:24px 28px;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.forecast-card.red{background:var(--red-bg);border-color:var(--red-soft)}
.forecast-card.green{background:var(--green-bg);border-color:var(--green-soft)}
.forecast-card .fc-lab{font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:700}
.forecast-card.red .fc-lab{color:var(--red-d)}
.forecast-card.green .fc-lab{color:var(--green-d)}
.forecast-card .fc-num{font-weight:900;font-size:74px;line-height:.95;letter-spacing:-.04em;color:var(--ink);margin-top:4px}
.forecast-card.red .fc-num{color:var(--red)}
.forecast-card.green .fc-num{color:var(--green-d)}
.forecast-card .fc-unit{font-size:24px;font-weight:700;margin-left:10px;color:inherit}
.forecast-card .fc-sub{font-size:14px;line-height:1.45;color:var(--ink-2);margin-top:6px;font-weight:500}

.q-section{margin-top:22px}
.q-section-title{font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:12px}
.q-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.q-card{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:6px;position:relative}
.q-card.peak{background:var(--red-bg);border-color:var(--red-soft)}
.q-card .q{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700}
.q-card.peak .q{color:var(--red)}
.q-card .v{font-weight:800;font-size:42px;line-height:1;color:var(--ink);margin-top:6px;letter-spacing:-.03em}
.q-card.peak .v{color:var(--red)}
.q-card .u{font-size:13px;color:var(--muted)}
.q-bar{height:6px;background:var(--line);border-radius:99px;margin-top:18px;position:relative;overflow:hidden}
.q-bar i{position:absolute;left:0;top:0;height:100%;background:var(--red-l);border-radius:99px;width:0;transition:width .9s cubic-bezier(.2,.7,.2,1)}
.q-card.peak .q-bar i{background:var(--red)}

/* Plan slide */
.plan-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:24px}

/* Navigation */
.nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:rgba(26,24,20,.08);backdrop-filter:blur(10px);border-radius:99px;padding:7px 14px;z-index:100;border:1px solid rgba(26,24,20,.12)}
.nav button{background:none;border:none;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);transition:background .2s;font-size:15px;font-weight:600}
.nav button:hover{background:rgba(26,24,20,.08)}
.nav .counter{font-size:12.5px;font-weight:700;color:var(--ink);min-width:48px;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:.04em}

.help{position:fixed;bottom:20px;right:20px;font-size:11px;color:var(--muted);z-index:100;letter-spacing:.04em;font-weight:500;background:rgba(250,244,229,.85);backdrop-filter:blur(8px);padding:8px 12px;border-radius:8px;border:1px solid var(--line)}

/* Reveal animations */
.reveal{opacity:0;transform:translateY(16px);transition:opacity .65s ease, transform .65s ease}
.slide.active .reveal{opacity:1;transform:none}
.slide.active .reveal.d1{transition-delay:.08s}

      <div class="plan-grid">
        ${[
          {n:'01',cls:'',t:'Ассортимент и категории',m:'5+ новых SKU Genso',b:'5+ новых SKU Genso в корейской волне (Кочукару, Кочудян, мисо, Самдян, ферментированные пасты). Цель — №1 в соевых пастах. <b>Esoro</b> — внешний прогрев бренда через посевы и UGC.'},
          {n:'02',cls:'green',t:'Усиление B2B сегмента',m:'1–2 крупных SKU на бренд',b:'Линейка крупных упаковок и B2B-аудитория на МП: имбирь 1,5 кг, панировка-панко, рис 25 кг, соевый соус 18 л. Привлечение B2B-трафика через внутренние и внешние каналы.'},

/* ============================ RENDER LAYER ============================ */
const deck = document.getElementById('deck');
SLIDES.forEach((s,i)=>{
  const el = document.createElement('section');
  el.className = 'slide';
  el.dataset.idx = i;
  el.innerHTML = `
    <div class="tbar">
      <div class="brand"><div class="brand-mark"><div class="sq"><img src="${LOGO_URL}" alt="Resfood" onerror="this.parentNode.innerHTML='R'"/></div><div class="nm">Resfood · Маркетплейсы 2025/26</div></div></div>
      <div class="right"><span>${s.kicker||''}</span><span class="dot"></span><span>${s.n} / 16</span></div>
    </div>
    <div class="body">${s.render()}</div>
    <div class="fbar"><span>RESFOOD · ОТЧЁТНОЕ СОБРАНИЕ</span><div class="progress"><i style="width:${((i+1)/SLIDES.length)*100}%"></i></div><span>${s.n}</span></div>
  `;
  deck.appendChild(el);
});

/* ============================ NAVIGATION ============================ */
let idx = 0;
const slides = [...document.querySelectorAll('.slide')];
const cur = document.getElementById('cur');
const tot = document.getElementById('tot');
tot.textContent = slides.length;

function show(n){
  n = Math.max(0, Math.min(slides.length-1, n));
  slides.forEach((s,i)=>{
    s.classList.toggle('active', i===n);
    s.classList.toggle('prev', i<n);
  });
  idx = n;
  cur.textContent = n+1;
  setTimeout(()=> animate(slides[n]), 250);
  if(window.location.hash !== `#${n+1}`) history.replaceState(null,'',`#${n+1}`);
}
function animate(slide){
  slide.querySelectorAll('.bar-mini').forEach(b=>{
    const w = b.dataset.w; const i = b.querySelector('i');
    if(i) i.style.width = w + '%';
  });
  slide.querySelectorAll('.q-bar i').forEach(i=>{
    const h = i.dataset.h;
    if(h) i.style.width = h + '%';
  });
  const data = SLIDES[+slide.dataset.idx];
  if(data.chart === 'rev_gp' && !slide._chart){ slide._chart = drawRevGP(slide.querySelector('#chartRevGP')); }
  if(data.chart === 'top15' && !slide._chart){ slide._chart = drawTop15(slide.querySelector('#chartTop15')); }
}

/* ============================ CHARTS ============================ */
const PAL = {
  ink: '#1A1814', muted: '#7A7066', red: '#C8302A', redD:'#9E2520',
  redL:'#E89189', green: '#2D4A35', greenL:'#6E8B6F', line: '#E5DAC0',
  paper:'#FAF4E5'
};
Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
Chart.defaults.font.weight = '500';
Chart.defaults.color = PAL.muted;
Chart.defaults.borderColor = PAL.line;

function drawRevGP(canvas){
  if(!canvas) return null;
  const ctx = canvas.getContext('2d');
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Wildberries', 'Ozon', 'ИТОГО'],
      datasets: [
        { label: 'Выручка 2024/25, млн ₽', data:[70.2, 176.7, 246.9], backgroundColor: PAL.redL, borderRadius: 5, barPercentage:.6, categoryPercentage:.7 },
        { label: 'Выручка 2025/26, млн ₽', data:[74.6, 330.8, 405.4], backgroundColor: PAL.red, borderRadius: 5, barPercentage:.6, categoryPercentage:.7 },
        { label: 'ВП 2024/25, млн ₽', data:[11.8, 34.2, 46.0], backgroundColor: PAL.greenL, borderRadius: 5, barPercentage:.6, categoryPercentage:.7 },
        { label: 'ВП 2025/26, млн ₽', data:[13.6, 61.9, 75.6], backgroundColor: PAL.green, borderRadius: 5, barPercentage:.6, categoryPercentage:.7 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false, animation:{duration: 900, easing:'easeOutQuart'},
      plugins:{
        legend:{position:'top', align:'end', labels:{boxWidth:10, boxHeight:10, padding:14, font:{size:12, weight:'600'}, color:PAL.ink}},
        tooltip:{backgroundColor:PAL.ink, titleColor:'#FFF', bodyColor:'#FFF', padding:12, cornerRadius:8, titleFont:{weight:'700'}}
      },
      scales:{
        x:{grid:{display:false}, ticks:{font:{size:13,weight:'700'}, color:PAL.ink}},
        y:{grid:{color:PAL.line, drawBorder:false}, ticks:{callback:(v)=>v+' млн', font:{size:11}}}
      }
    }
  });
}
function drawTop15(canvas){
  if(!canvas) return null;
  const items = [
    ['Нори Tidori 100 листов', 14.5, 10.7, '+36%'],
    ['Онигири нори Tidori', 6.8, 4.3, '+59%'],
    ['Нори Tidori 50 листов', 5.6, 5.5, '+2%'],
    ['Соус Терияки Genso 1,5 л', 4.5, 2.8, '+57%'],
    ['Юдзу Чай ESORO 1 кг', 4.1, 2.9, '+44%'],
    ['Каффир лайм Genso', 4.1, 2.6, '+57%'],
    ['Кочукару Genso · ×77', 3.6, 0.047, '×77'],
    ['Рисовая бумага Kekeshi 500 г', 3.4, 3.1, '+9%'],
    ['Мисо паста светлая Genso', 3.3, 2.2, '+54%'],
    ['Нори Tidori (другой формат)', 3.3, 2.7, '+23%'],
    ['Соус Гриль got2eat 1 кг', 3.0, 2.6, '+16%'],
    ['Дайкон такуан Hansey 600 г', 3.0, 1.7, '+76%'],
    ['Мисо паста тёмная Genso', 2.9, 2.0, '+43%'],
    ['Лапша Рамен Kekeshi 1 кг', 2.7, 1.9, '+41%'],
    ['Соус рыбный Resfood 700 мл', 2.7, 1.4, '+91%'],
  ];
  // Custom plugin: draw +XX% to the right of the current-period bar
  const deltaPlugin = {
    id: 'deltaLabels',
    afterDatasetsDraw(chart){
      const {ctx, scales:{x,y}} = chart;
      const ds = chart.getDatasetMeta(1); // current period dataset
      if(!ds || !ds.data) return;
      ctx.save();
      ctx.font = '700 12px Inter, system-ui, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ds.data.forEach((bar, i)=>{
        const delta = items[i][3];
        const isHighlight = delta === '×77' || (delta.startsWith('+') && parseInt(delta.slice(1)) >= 50);
        ctx.fillStyle = isHighlight ? PAL.red : PAL.green;
        ctx.fillText(delta, bar.x + 8, bar.y);
      });
      ctx.restore();
    }
  };
  const ctx = canvas.getContext('2d');
  return new Chart(ctx, {
    type:'bar',
    data:{
      labels: items.map(r=>r[0]),
      datasets:[
        { label:'Q2+Q3 2025, млн ₽', data: items.map(r=>r[2]), backgroundColor: PAL.redL, borderRadius: 4, categoryPercentage:.85, barPercentage:.85 },
        { label:'Q4 2025 + Q1 2026, млн ₽', data: items.map(r=>r[1]), backgroundColor: PAL.red, borderRadius: 4, categoryPercentage:.85, barPercentage:.85 },
      ]
    },
    plugins: [deltaPlugin],
    options:{
      responsive:true, maintainAspectRatio:false, indexAxis:'y',
      animation:{duration: 900, easing:'easeOutQuart'},
      layout:{padding:{right: 60}},
      plugins:{
        legend:{position:'top', align:'end', labels:{boxWidth:10, boxHeight:10, padding:12, font:{size:12, weight:'600'}, color:PAL.ink}},
        tooltip:{backgroundColor:PAL.ink, titleColor:'#FFF', bodyColor:'#FFF', padding:12, cornerRadius:8,
          callbacks:{ label:(c)=>{ const r = items[c.dataIndex]; return `${c.dataset.label}: ${c.parsed.x.toFixed(c.parsed.x<0.1?3:1)} · Δ ${r[3]}`; } }
        },
      },
      scales:{
        x:{grid:{color:PAL.line, drawBorder:false}, ticks:{callback:v=>v+' млн', font:{size:11}}, beginAtZero:true},
        y:{grid:{display:false}, ticks:{font:{size:11.5,weight:'600'}, color:PAL.ink}}
      }
    }
  });
}

/* ============================ EVENTS ============================ */
document.getElementById('next').onclick = ()=> show(idx+1);
document.getElementById('prev').onclick = ()=> show(idx-1);
window.addEventListener('keydown', e=>{
  if(['ArrowRight','PageDown',' '].includes(e.key)){ e.preventDefault(); show(idx+1); }
  if(['ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); show(idx-1); }
  if(e.key === 'Home'){ e.preventDefault(); show(0); }
  if(e.key === 'End'){ e.preventDefault(); show(slides.length-1); }
  if(e.key === 'f' || e.key === 'F'){ if(document.fullscreenElement) document.exitFullscreen(); else document.documentElement.requestFullscreen(); }
});
let touchX = null;
window.addEventListener('touchstart', e=> touchX = e.touches[0].clientX);
window.addEventListener('touchend', e=>{
  if(touchX===null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(Math.abs(dx) > 50){ show(idx + (dx<0?1:-1)); }
  touchX = null;
});
const initial = parseInt((location.hash||'#1').slice(1)) - 1;
show(isNaN(initial)?0:initial);
</script>
